name: Sotto
options:
  bundleIdPrefix: app.decanlys
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
    DEVELOPMENT_TEAM: XV3864F3BP
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.4
  SwiftOpus:
    url: https://github.com/nelcea/swift-opus
    exactVersion: 1.0.0
targets:
  Sotto:
    type: application
    platform: iOS
    sources:
      - path: Sotto
        excludes:
          - "Resources"
      - path: Sotto/Resources/silero-vad-unified-256ms-v6.0.0.mlmodelc
        type: folder
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - package: SwiftOpus
        product: Opus
      - target: SottoWidgets
        embed: true
    settings:
      base:
        # Explicit because bundleIdPrefix + target name would derive app.decanlys.Sotto;
        # the identity is all-lowercase. (The original com.decanlys.Sotto is locked by
        # the defunct free team's App ID registration — see issue #5 follow-up.)
        PRODUCT_BUNDLE_IDENTIFIER: app.decanlys.sotto
    info:
      path: Sotto/Info.plist
      properties:
        NSMicrophoneUsageDescription: Sotto listens for nearby speech and records only while people are talking. Audio is processed on this device.
        NSBluetoothAlwaysUsageDescription: Sotto connects to your paired Omi wearable to capture audio from its microphone.
        UIBackgroundModes: [audio, bluetooth-central]
        NSSupportsLiveActivities: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen: {}
        # iPad targets must support all orientations now that iPadOS 26
        # deprecates UIRequiresFullScreen (Xcode 26 validation warning).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sotto/Sotto.entitlements
      # xcodegen REGENERATES this file on every `xcodegen generate`; without these
      # properties it writes an empty <dict/>, silently stripping the iCloud capability
      # (discovered when the signing round-trip's entitlements kept reverting).
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.app.decanlys.sotto
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.app.decanlys.sotto
  SottoWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SottoWidgets
      - path: Sotto/LiveActivity/SottoActivityAttributes.swift
      - path: Sotto/LiveActivity/ToggleListeningIntent.swift
      # Ink prominent buttons in the Live Activity: the shared style helper plus the
      # Ink/Porcelain colorsets — Color("Ink") resolves against the extension's own
      # bundle, so the catalog must ship in both (2026-07-10 ink-prominent spec).
      - path: Sotto/App/InkProminent.swift
      - path: Sotto/Assets.xcassets
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        PRODUCT_BUNDLE_IDENTIFIER: app.decanlys.sotto.SottoWidgets
    info:
      path: SottoWidgets/Info.plist
      properties:
        CFBundleDisplayName: Sotto
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  SottoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SottoTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Sotto
      - package: SwiftOpus
        product: Opus
schemes:
  Sotto:
    build:
      targets:
        Sotto: all
    test:
      targets:
        - SottoTests
