name: Sotto
options:
  bundleIdPrefix: com.decanlys
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.4
targets:
  Sotto:
    type: application
    platform: iOS
    sources:
      - path: Sotto
        excludes:
          - "Resources"
      - path: Sotto/Resources/silero-vad-unified-256ms-v6.0.0.mlmodelc
        type: folder
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - target: SottoWidgets
        embed: true
    info:
      path: Sotto/Info.plist
      properties:
        NSMicrophoneUsageDescription: Sotto listens for nearby speech and records only while people are talking. Audio is processed on this device.
        UIBackgroundModes: [audio]
        NSSupportsLiveActivities: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen: {}
  SottoWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SottoWidgets
      - path: Sotto/LiveActivity/SottoActivityAttributes.swift
      - path: Sotto/LiveActivity/ToggleListeningIntent.swift
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        PRODUCT_BUNDLE_IDENTIFIER: com.decanlys.Sotto.SottoWidgets
    info:
      path: SottoWidgets/Info.plist
      properties:
        CFBundleDisplayName: Sotto
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  SottoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SottoTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Sotto
schemes:
  Sotto:
    build:
      targets:
        Sotto: all
    test:
      targets:
        - SottoTests
