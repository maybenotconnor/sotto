name: Sotto
options:
  bundleIdPrefix: com.decanlys
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.15.4
  SwiftOpus:
    url: https://github.com/nelcea/swift-opus
    exactVersion: 1.0.0
targets:
  Sotto:
    type: application
    platform: iOS
    sources:
      - path: Sotto
        excludes:
          - "Resources"
      - path: Sotto/Resources/silero-vad-unified-256ms-v6.0.0.mlmodelc
        type: folder
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - package: SwiftOpus
        product: Opus
      - target: SottoWidgets
        embed: true
    info:
      path: Sotto/Info.plist
      properties:
        NSMicrophoneUsageDescription: Sotto listens for nearby speech and records only while people are talking. Audio is processed on this device.
        NSBluetoothAlwaysUsageDescription: Sotto connects to your paired Omi wearable to capture audio from its microphone.
        UIBackgroundModes: [audio, bluetooth-central]
        NSSupportsLiveActivities: true
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen: {}
        # iPad targets must support all orientations now that iPadOS 26
        # deprecates UIRequiresFullScreen (Xcode 26 validation warning).
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: Sotto/Sotto.entitlements
      # TEMPORARY — free-provisioning workaround (see GitHub issue #5).
      # iCloud entitlements removed so a free "Personal Team" can sign the app for
      # on-device testing: a Personal Team cannot grant CloudDocuments/ubiquity-container
      # capabilities. Empty `properties` => xcodegen writes an empty <dict/>, and
      # ICloudSyncSink no-ops at runtime (the ubiquity container resolves to nil).
      # RESTORE before release:
      #   git checkout project.yml Sotto/Sotto.entitlements && xcodegen generate
      # Original iCloud entitlements to restore (also recorded in issue #5):
      #   com.apple.developer.icloud-container-identifiers: [iCloud.com.decanlys.Sotto]
      #   com.apple.developer.icloud-services: [CloudDocuments]
      #   com.apple.developer.ubiquity-container-identifiers: [iCloud.com.decanlys.Sotto]
      properties: {}
  SottoWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SottoWidgets
      - path: Sotto/LiveActivity/SottoActivityAttributes.swift
      - path: Sotto/LiveActivity/ToggleListeningIntent.swift
      # Ink prominent buttons in the Live Activity: the shared style helper plus the
      # Ink/Porcelain colorsets — Color("Ink") resolves against the extension's own
      # bundle, so the catalog must ship in both (2026-07-10 ink-prominent spec).
      - path: Sotto/App/InkProminent.swift
      - path: Sotto/Assets.xcassets
    settings:
      base:
        SWIFT_VERSION: "6.0"
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        PRODUCT_BUNDLE_IDENTIFIER: com.decanlys.Sotto.SottoWidgets
    info:
      path: SottoWidgets/Info.plist
      properties:
        CFBundleDisplayName: Sotto
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  SottoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SottoTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Sotto
      - package: SwiftOpus
        product: Opus
schemes:
  Sotto:
    build:
      targets:
        Sotto: all
    test:
      targets:
        - SottoTests
